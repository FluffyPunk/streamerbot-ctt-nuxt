<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>StreamerBot Chat</title>

    <script src="streamerbot-client.js"></script>

    <link rel="stylesheet" href="fullsize.css" />
  </head>

  <body>
    <header>
      Live Chat
      <div id="status" class="status-connecting">Connecting…</div>
    </header>

    <div id="events-bar">
      <div id="events-track"></div>
    </div>

    <div id="columns">
      <div class="column">
        <div class="column-header twitch">
          <svg
            class="platform-icon"
            viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              fill="#9147ff"
              d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"
            />
          </svg>
          Twitch
        </div>
        <div class="chat" id="chat-twitch"></div>
      </div>
      <div class="column">
        <div class="column-header youtube">
          <svg
            class="platform-icon"
            viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              fill="#ff0000"
              d="M23.495 6.205a3.007 3.007 0 0 0-2.088-2.088c-1.87-.501-9.396-.501-9.396-.501s-7.507-.01-9.396.501A3.007 3.007 0 0 0 .527 6.205a31.247 31.247 0 0 0-.522 5.805 31.247 31.247 0 0 0 .522 5.783 3.007 3.007 0 0 0 2.088 2.088c1.868.502 9.396.502 9.396.502s7.506 0 9.396-.502a3.007 3.007 0 0 0 2.088-2.088 31.247 31.247 0 0 0 .5-5.783 31.247 31.247 0 0 0-.5-5.805zM9.609 15.601V8.408l6.264 3.602z"
            />
          </svg>
          YouTube
        </div>
        <div class="chat" id="chat-youtube"></div>
      </div>
    </div>

    <script>
      const twitchContainer = document.getElementById("chat-twitch");
      const youtubeContainer = document.getElementById("chat-youtube");
      const statusIndicator = document.getElementById("status");
      const eventsTrack = document.getElementById("events-track");

      const EVENTS_STORAGE_KEY = "eventsHistory";
      const MAX_STORED_EVENTS = 10;

      function renderEventPill(
        { source, type, name, value },
        shouldAnimate = true,
      ) {
        const pill = document.createElement("div");
        pill.className = "event-pill " + source.toLowerCase();

        if (name) {
          const nameSpan = document.createElement("span");
          nameSpan.className = "ep-name";
          nameSpan.textContent = name;
          pill.appendChild(nameSpan);
        }

        const typeSpan = document.createElement("span");
        typeSpan.className = "ep-data";
        typeSpan.textContent = type;
        pill.appendChild(typeSpan);

        if (value) {
          const valueSpan = document.createElement("span");
          valueSpan.className = "ep-data";
          valueSpan.textContent = value;
          pill.appendChild(valueSpan);
        }

        eventsTrack.appendChild(pill);

        if (!shouldAnimate) {
          return;
        }
      }

      function loadEventHistory() {
        try {
          const stored = JSON.parse(
            localStorage.getItem(EVENTS_STORAGE_KEY) || "[]",
          );
          stored
            .slice(0, MAX_STORED_EVENTS)
            .reverse()
            .forEach((item) => renderEventPill(item, false));
        } catch {}
      }

      function saveEventHistory(eventItem) {
        try {
          const stored = JSON.parse(
            localStorage.getItem(EVENTS_STORAGE_KEY) || "[]",
          );
          const next = [eventItem, ...stored].slice(0, MAX_STORED_EVENTS);
          localStorage.setItem(EVENTS_STORAGE_KEY, JSON.stringify(next));
        } catch {}
      }

      const TICKER_PX_PER_SEC = 100;

      function updateTickerDuration() {
        const w = eventsTrack.scrollWidth;
        if (w === 0) return;
        const dur = Math.max(5, w / TICKER_PX_PER_SEC);
        eventsTrack.style.animationDuration = dur + "s";
      }

      function addEventPill(source, type, name, value) {
        const item = { source, type, name, value };
        renderEventPill(item);
        saveEventHistory(item);
        updateTickerDuration();
      }

      loadEventHistory();
      updateTickerDuration();

      function setStatus(state, text) {
        statusIndicator.className = "status-" + state;
        statusIndicator.textContent = text;
      }

      function scrollToBottom(container) {
        container.scrollTop = container.scrollHeight;
      }

      function getTime() {
        return new Date().toLocaleTimeString([], {
          hour: "2-digit",
          minute: "2-digit",
        });
      }

      function normalizeBadges(badges) {
        if (Array.isArray(badges)) {
          return badges;
        }

        if (badges && typeof badges === "object") {
          return [badges];
        }

        return [];
      }

      function getYouTubeBadgeText(badge) {
        let badgeText = "";
        badgeText += badge?.mod ? "🗡 " : "";
        badgeText += badge?.sponsor ? "💚 " : "";
        badgeText += badge?.verified ? "✔ " : "";
        return badgeText.trim();
      }

      async function renderMessage(
        container,
        username,
        color,
        messageText,
        badges,
        emotes,
        mention,
        messageId,
        reply,
      ) {
        const msg = document.createElement("div");
        msg.className = mention ? "message mention" : "message";

        const meta = document.createElement("div");
        meta.className = "meta";

        // Badges
        normalizeBadges(badges).forEach((b) => {
          if (container === twitchContainer) {
            if (!b.imageUrl) return;
            const img = document.createElement("img");
            img.className = "badge";
            img.src = b.imageUrl;
            img.title = b.name || "";
            img.onerror = () => img.remove();
            meta.appendChild(img);
          } else {
            const emoji = getYouTubeBadgeText(b);
            if (!emoji) return;
            const badgeSpan = document.createElement("span");
            badgeSpan.className = "badge";
            badgeSpan.textContent = emoji;
            meta.appendChild(badgeSpan);
          }
        });

        // Username
        const userSpan = document.createElement("span");
        userSpan.className = "user";
        userSpan.style.color = color || "var(--accent)";
        userSpan.textContent = username;
        msg.dataset.name = username;
        if (messageId) {
          msg.id = messageId;
        }
        meta.appendChild(userSpan);

        // Reply handler
        if (reply && container === twitchContainer) {
          const replySpan = document.createElement("span");
          replySpan.className = "reply";
          replySpan.textContent = `Replying to ${reply.userName}'s message: "${reply.msgBody}"`;
          msg.appendChild(replySpan);
        }

        // Message text inline
        const textSpan = document.createElement("span");
        textSpan.className = "text";
        let pText = messageText.split(" ");
        for await (const w of pText) {
          if (emotes && emotes[0]?.name == w) {
            const emote = document.createElement("img");
            emote.className = "badge";
            emote.src = emotes[0].imageUrl;
            textSpan.append(emote, " ");
            emotes.shift();
          } else {
            const match = w.match(
              /(https?:\/\/[^\s,]+|www\.[^\s,]+|(?:[a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}(?::\d+)?(?:\/[^\s,]*)?|(?:\d{1,3}\.){3}\d{1,3}(?::\d+)?(?:\/[^\s,]*)?)/,
            );
            if (match) {
              const rawUrl = match[0];
              const url = rawUrl.replace(/[).,!?:;]+$/, "");
              const trailingText = rawUrl.slice(url.length);
              const link = document.createElement("a");
              link.href = url.startsWith("http") ? url : "https://" + url;
              link.textContent = url;
              link.target = "_blank";
              link.className = "link";
              textSpan.append(link);
              if (trailingText) textSpan.append(trailingText);
              const rest = w.slice(match.index + rawUrl.length);
              if (rest) textSpan.append(rest);
              textSpan.append(" ");
            } else {
              textSpan.append(w, " ");
            }
          }
        }
        meta.appendChild(textSpan);

        // Timestamp
        const timeSpan = document.createElement("span");
        timeSpan.className = "time";
        timeSpan.textContent = getTime();
        meta.appendChild(timeSpan);

        msg.appendChild(meta);
        container.prepend(msg);
      }

      function purgeOnBan(e) {
        const { data, event } = e;
        if (!data) return;
        const username = data.targetUser?.name || data.user?.name;
        if (!username) return;

        const source = event?.source || "Twitch";
        const container =
          source === "YouTube" ? youtubeContainer : twitchContainer;
        let messages = container.querySelectorAll(
          `.message[data-name="${username}"]`,
        );
        (messages || []).forEach((m) => m.remove());
      }

      function removeMessage(e) {
        const { data, event } = e;
        if (!data) return;
        const messageId = data.messageId;
        const container = twitchContainer;
        //source === "YouTube" ? youtubeContainer : twitchContainer;
        let message = document.getElementById(messageId);
        if (message) message.remove();
      }

      // ── Streamer.bot WebSocket Client ────────────────────────────────────────────
      // Make sure Streamer.bot's WebSocket Server is bound to 10.0.0.95 (not 127.0.0.1)
      // under Servers/Clients → WebSocket Server, otherwise remote connections are refused.

      const connectionParams = new URLSearchParams(window.location.search);
      if (
        ["10.0.0.195", "10.0.0.193"].includes(
          localStorage.getItem("streamerbot.host"),
        )
      ) {
        localStorage.removeItem("streamerbot.host");
      }
      const streamerbotHost =
        connectionParams.get("host") ||
        localStorage.getItem("streamerbot.host") ||
        "10.0.0.95";
      const configuredPort = Number(
        connectionParams.get("port") ||
          localStorage.getItem("streamerbot.port") ||
          8080,
      );
      const streamerbotPort = Number.isFinite(configuredPort)
        ? configuredPort
        : 8080;

      localStorage.setItem("streamerbot.host", streamerbotHost);
      localStorage.setItem("streamerbot.port", String(streamerbotPort));

      const client = new StreamerbotClient({
        host: streamerbotHost,
        port: streamerbotPort,
        password: "", // fill in if you set a password in Streamer.bot
        immediate: false,
        autoReconnect: true,
        onConnect: () => setStatus("connected", "Connected"),
        onDisconnect: () => setStatus("disconnected", "Disconnected"),
        onError: () => setStatus("disconnected", "Connection failed"),
      });

      client.connect(30000).catch(() => {
        setStatus("disconnected", "Connection failed");
      });

      // ── Chat message handlers ────────────────────────────────────────────────────

      function colorFromName(name) {
        let hash = 0;
        for (let i = 0; i < name.length; i++) {
          hash = name.charCodeAt(i) + ((hash << 5) - hash);
        }
        const h = Math.abs(hash) % 360;
        return `hsl(${h}, 70%, 65%)`;
      }

      function handleChatMessage(e) {
        const { data, event } = e;
        if (!data) return;

        const source = event?.source || "Twitch";

        let displayName,
          color,
          messageText,
          badges,
          mention,
          messageId,
          emotes,
          reply;

        if (source === "YouTube") {
          displayName = data.user?.name || "Unknown";
          color = colorFromName(displayName);
          messageText = data.message || "";
          emotes = data.emotes || [];
          badges = [
            {
              mod: data.user?.isModerator,
              sponsor: data.user?.isSponsor,
              verified: data.user?.isVerified,
            },
          ];
          messageId = data.messageId || data.id;
        } else {
          emotes = data.emotes;
          // Twitch: text lives at data.message.message, user info at data.message / data.user
          displayName =
            data.message?.displayName || data.user?.name || "Unknown";
          color = data.message?.color || data.user?.color || "var(--twitch)";
          messageText = data.message?.message || data.text || "";
          badges = data.message?.badges || data.user?.badges || [];
          mention = messageText.toLowerCase().includes("christitustech");
          messageId = data.messageId;
          reply = data.reply;
        }

        const container =
          source === "YouTube" ? youtubeContainer : twitchContainer;
        renderMessage(
          container,
          displayName,
          color,
          messageText,
          badges,
          emotes,
          mention,
          messageId,
          reply,
        );
      }

      client.on("Twitch.ChatMessage", handleChatMessage);
      client.on("YouTube.Message", handleChatMessage);
      client.on("Twitch.UserBanned", purgeOnBan);
      client.on("YouTube.UserBanned", purgeOnBan);
      client.on("Twitch.UserTimedOut", purgeOnBan); // Even with fact that YT has timeouts, there no event for that in docs
      client.on("Twitch.ChatMessageDeleted", removeMessage); // YT WIP, no data about messages, so DIY

      // ── Events ticker ────────────────────────────────────────────────────────────

      const youtubeEventWhitelist = new Set([
        "MembershipGift",
        "SuperChat",
        "SuperSticker",
      ]);

      function handleTwitchEvent(e) {
        let name, value;
        let validEvent = true;
        const { data, event } = e;
        if (!event) return;
        let type = event.type;
        switch (type) {
          case "Sub":
            name = data.user.name;
            type = data.is_prime
              ? "PrimeSub"
              : `Tier ${data.sub_tier.substring(0, 1)} ${type} for ${data.durationMonths} months`;
            break;

          case "ReSub":
            name = data.user.name;
            type = data.is_prime
              ? "PrimeReSub"
              : `Tier ${data.subTier.substring(0, 1)} ${type} for ${data.durationMonths} months`;
            value = `/ Total: ${data.cumulativeMonths} months`;
            break;

          // case "GiftBomb":
          //     name = data.user.name;
          //     type = data.total > 1 ? type : "RandomSub";
          //     value = data.total > 1 ? `${data.total}x Tier ${data.sub_tier.substring(0,1)}` : `${data.recipients[0]} Tier ${data.sub_tier.substring(0,1)}`
          //     break;

          case "GiftSub":
            name = data.user.name;
            type = data.fromCommunitySubGift ? "RandomSub" : type;
            value =
              type == "RandomSub"
                ? `Tier ${data.subTier.substring(0, 1)} to ${data.recipient.name}`
                : `${data.durationMonths} months of Tier ${data.subTier.substring(0, 1)} to ${data.recipient.name}`;
            break;

          case "Raid":
            // There is no data for that yet, so it will just be raid from guy
            name = data.user.name;
            break;

          case "Cheer":
            name = data.anonymous ? "Anonymous" : data.user.name;
            value = data.bits;
            break;

          default:
            validEvent = false;
            break;
        }
        if (validEvent) addEventPill("Twitch", type, name, value);
      }

      function handleYouTubeEvent(e) {
        const { data, event } = e;
        if (!event) return;
        const type = event.type;
        if (!youtubeEventWhitelist.has(type)) return;
        const name = data?.user?.name || data?.sponsor?.name || "";
        addEventPill("YouTube", type, name, "");
      }

      client.on("Twitch.*", handleTwitchEvent);
      client.on("YouTube.*", handleYouTubeEvent);
    </script>
  </body>
</html>
